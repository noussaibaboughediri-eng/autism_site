<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نجوم — لوحة الإدارة</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --cream:#faf6ef;--warm:#f5ece0;
  --clay:#c17b5c;--clay2:#e8a882;
  --moss:#5a7c65;--moss2:#8dba9a;
  --sky:#6fa3c4;
  --sun:#e8c45a;--sun2:#f5d98a;
  --lilac:#9b7fb8;
  --ink:#2c2318;--ink2:#5a4d3e;
  --border:rgba(44,35,24,0.12);
  --surface:#ffffff;
  --err:#c0392b;--err-bg:rgba(192,57,43,0.08);
  --ok:#5a7c65;--ok-bg:rgba(90,124,101,0.1);
  --warn:#b08a20;--warn-bg:rgba(232,196,90,0.12);
}
html{scroll-behavior:smooth;}
body{font-family:'Tajawal',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh;overflow-x:hidden;cursor:none;}

/* CURSOR */
.cur{width:12px;height:12px;background:var(--clay);border-radius:50%;position:fixed;z-index:9999;pointer-events:none;transform:translate(-50%,-50%);transition:width .2s,height .2s,background .2s;mix-blend-mode:multiply;}
.cur-r{width:34px;height:34px;border:2px solid var(--clay);border-radius:50%;position:fixed;z-index:9998;pointer-events:none;transform:translate(-50%,-50%);opacity:.38;transition:width .3s,height .3s;}

/* NOISE */
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.025;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.dots{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:radial-gradient(circle,rgba(44,35,24,.05) 1px,transparent 1px);background-size:26px 26px;}
.blob{position:fixed;border-radius:50%;filter:blur(90px);opacity:.22;pointer-events:none;z-index:0;animation:breathe 14s ease-in-out infinite;}
.b1{width:500px;height:500px;background:#d4c4a8;top:-150px;right:-150px;}
.b2{width:380px;height:380px;background:#c4d8c8;bottom:-100px;left:-100px;animation-delay:-5s;}
.b3{width:260px;height:260px;background:#c8d8e8;top:45%;left:25%;animation-delay:-9s;}
@keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.07);}}

/* ═══ LOGIN ═══ */
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative;z-index:2;padding:2rem 1rem;}
.login-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:28px;padding:2.8rem 2.4rem;
  width:100%;max-width:420px;
  box-shadow:0 20px 60px rgba(44,35,24,.1),0 4px 16px rgba(44,35,24,.06);
  animation:fadeUp .6s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}
.login-logo{
  width:78px;height:78px;
  background:linear-gradient(135deg,var(--clay2),var(--clay));
  border-radius:22px;display:flex;align-items:center;justify-content:center;
  font-size:2.2rem;margin:0 auto 1.6rem;
  box-shadow:0 8px 30px rgba(193,123,92,.28);
  animation:float0 6s ease-in-out infinite;
}
@keyframes float0{0%,100%{transform:translateY(0);}50%{transform:translateY(-6px);}}
.login-card h2{text-align:center;font-size:1.5rem;font-weight:900;color:var(--ink);margin-bottom:.35rem;}
.login-card .sub{text-align:center;color:var(--ink2);font-size:.86rem;margin-bottom:2rem;line-height:1.7;}

/* lang in login */
.login-lang{display:flex;justify-content:center;margin-bottom:1.8rem;}
.lang-pill{display:flex;background:var(--warm);border:1.5px solid var(--border);border-radius:50px;overflow:hidden;}
.lbtn{padding:.3rem .9rem;border:none;background:transparent;font-family:'Tajawal',sans-serif;font-size:.78rem;font-weight:800;color:var(--ink2);cursor:pointer;transition:all .2s;}
.lbtn.active{background:var(--clay);color:#fff;border-radius:50px;}

.fg{margin-bottom:.9rem;}
label{display:block;font-size:.78rem;font-weight:700;color:var(--ink2);margin-bottom:.38rem;}
input{
  width:100%;padding:.72rem .9rem;
  background:var(--cream);border:1.5px solid var(--border);
  border-radius:11px;color:var(--ink);
  font-size:.88rem;font-family:'Tajawal',sans-serif;
  transition:border-color .2s,box-shadow .2s;
}
input:focus{outline:none;border-color:var(--clay);box-shadow:0 0 0 3px rgba(193,123,92,.1);}

.btn-gold{
  width:100%;padding:.88rem;border:none;border-radius:13px;
  background:linear-gradient(135deg,var(--clay2),var(--clay));
  color:#fff;font-size:.97rem;font-family:'Tajawal',sans-serif;font-weight:800;
  cursor:pointer;margin-top:.5rem;
  box-shadow:0 6px 20px rgba(193,123,92,.28);
  transition:all .25s cubic-bezier(.34,1.4,.64,1);
  position:relative;overflow:hidden;
}
.btn-gold::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,.12);opacity:0;transition:opacity .2s;}
.btn-gold:hover::before{opacity:1;}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 10px 28px rgba(193,123,92,.38);}

.alert{padding:.72rem .9rem;border-radius:11px;margin-bottom:.9rem;font-size:.84rem;display:none;font-weight:600;}
.alert.err{background:var(--err-bg);border:1.5px solid rgba(192,57,43,.22);color:var(--err);display:block;}

/* ═══ DASHBOARD ═══ */
#dashboard{display:none;min-height:100vh;position:relative;z-index:2;}

/* HEADER */
.hdr{
  background:rgba(250,246,239,.88);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1.5px solid var(--border);
  padding:0 2.5rem;height:68px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
.hdr-logo{display:flex;align-items:center;gap:.65rem;font-weight:900;font-size:1rem;color:var(--ink);}
.hdr-star{font-size:1.2rem;animation:spin 8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.hdr-right{display:flex;align-items:center;gap:.9rem;}
.admin-badge{
  display:inline-flex;align-items:center;gap:.4rem;
  background:rgba(193,123,92,.1);border:1.5px solid rgba(193,123,92,.25);
  color:var(--clay);padding:.28rem .85rem;border-radius:50px;font-size:.76rem;font-weight:800;
}
.logout-btn{
  padding:.38rem 1rem;background:transparent;
  border:1.5px solid var(--border);border-radius:50px;
  color:var(--ink2);font-family:'Tajawal',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .2s;
}
.logout-btn:hover{border-color:var(--err);color:var(--err);}

/* CONTENT */
.content{padding:2.5rem;max-width:1060px;margin:0 auto;}

/* TABS */
.tabs{display:flex;gap:.6rem;margin-bottom:2rem;flex-wrap:wrap;}
.tab{
  padding:.48rem 1.15rem;background:var(--surface);
  border:1.5px solid var(--border);border-radius:50px;
  color:var(--ink2);cursor:pointer;font-size:.82rem;font-weight:700;
  font-family:'Tajawal',sans-serif;
  transition:all .25s cubic-bezier(.34,1.4,.64,1);
}
.tab:hover{border-color:var(--clay);color:var(--clay);}
.tab.active{background:var(--clay);border-color:var(--clay);color:#fff;box-shadow:0 4px 14px rgba(193,123,92,.28);}

/* USER CARD */
.req-card{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:20px;padding:1.6rem;margin-bottom:1.1rem;
  box-shadow:0 4px 18px rgba(44,35,24,.06);
  transition:box-shadow .3s,transform .3s;
  animation:fadeUp .45s ease both;
}
.req-card:hover{box-shadow:0 10px 32px rgba(44,35,24,.1);transform:translateY(-2px);}

.req-top{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:1rem;}

.info h3{font-size:1rem;font-weight:800;color:var(--ink);margin-bottom:.45rem;display:flex;align-items:center;gap:.5rem;flex-wrap:wrap;}
.info p{color:var(--ink2);font-size:.82rem;line-height:1.9;}
.info .date{font-size:.72rem;color:var(--clay2);margin-top:.25rem;}

/* status */
.status{display:inline-flex;align-items:center;gap:.3rem;padding:.2rem .65rem;border-radius:7px;font-size:.72rem;font-weight:800;}
.s-pending {background:var(--warn-bg);color:var(--warn);}
.s-accepted{background:var(--ok-bg);color:var(--ok);}
.s-rejected{background:var(--err-bg);color:var(--err);}

/* actions */
.actions{display:flex;gap:.5rem;flex-shrink:0;flex-wrap:wrap;}
.btn-accept{
  padding:.42rem .95rem;
  background:rgba(90,124,101,.1);border:1.5px solid rgba(90,124,101,.3);
  color:var(--moss);border-radius:10px;cursor:pointer;font-size:.8rem;font-weight:700;
  font-family:'Tajawal',sans-serif;transition:all .2s;
}
.btn-accept:hover{background:rgba(90,124,101,.2);transform:translateY(-1px);}
.btn-reject{
  padding:.42rem .95rem;
  background:var(--err-bg);border:1.5px solid rgba(192,57,43,.22);
  color:var(--err);border-radius:10px;cursor:pointer;font-size:.8rem;font-weight:700;
  font-family:'Tajawal',sans-serif;transition:all .2s;
}
.btn-reject:hover{background:rgba(192,57,43,.14);transform:translateY(-1px);}
.btn-delete{
  padding:.42rem .95rem;
  background:rgba(44,35,24,.05);border:1.5px solid var(--border);
  color:var(--ink2);border-radius:10px;cursor:pointer;font-size:.8rem;font-weight:700;
  font-family:'Tajawal',sans-serif;transition:all .2s;
}
.btn-delete:hover{background:var(--err-bg);border-color:rgba(192,57,43,.22);color:var(--err);}

/* child grid */
.child-grid{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));
  gap:.6rem;margin-top:1rem;padding-top:1rem;border-top:1.5px solid var(--border);
}
.ci{background:var(--cream);border:1.5px solid var(--border);border-radius:11px;padding:.65rem .9rem;transition:border-color .2s;}
.ci:hover{border-color:rgba(193,123,92,.25);}
.ci-lbl{font-size:.67rem;font-weight:700;color:var(--ink2);margin-bottom:.2rem;text-transform:uppercase;letter-spacing:.05em;}
.ci-val{font-size:.83rem;font-weight:700;color:var(--ink);}

/* autism levels */
.lvl-خفيف,.lvl-Mild   {color:var(--moss);font-weight:800;}
.lvl-متوسط,.lvl-Moderate{color:var(--warn);font-weight:800;}
.lvl-شديد,.lvl-Severe  {color:var(--err);font-weight:800;}

/* cert section */
.cert-section{margin-top:1rem;padding-top:1rem;border-top:1.5px solid var(--border);}
.cert-sec-title{font-size:.7rem;font-weight:900;color:var(--clay);letter-spacing:.1em;text-transform:uppercase;margin-bottom:.65rem;}
.cert-card{
  display:flex;align-items:center;gap:.85rem;
  background:rgba(90,124,101,.06);border:1.5px solid rgba(90,124,101,.22);
  border-radius:13px;padding:.8rem 1rem;
}
.cert-ico{width:42px;height:42px;border-radius:11px;background:rgba(90,124,101,.1);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
.cert-info{flex:1;min-width:0;}
.cert-name{font-size:.82rem;font-weight:700;color:var(--moss);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cert-sub{font-size:.7rem;color:var(--ink2);margin-top:.1rem;}
.cert-actions{display:flex;gap:.4rem;flex-shrink:0;}
.btn-view{
  padding:.32rem .8rem;
  background:rgba(90,124,101,.1);border:1.5px solid rgba(90,124,101,.25);
  color:var(--moss);border-radius:8px;cursor:pointer;font-size:.76rem;font-weight:700;
  text-decoration:none;display:inline-flex;align-items:center;gap:.3rem;
  transition:all .2s;
}
.btn-view:hover{background:rgba(90,124,101,.2);}
.no-cert{font-size:.8rem;color:var(--ink2);padding:.45rem 0;display:flex;align-items:center;gap:.4rem;opacity:.65;}

/* empty */
.empty{text-align:center;padding:4rem;color:var(--ink2);font-size:.95rem;}
.empty .e-ico{font-size:2.5rem;margin-bottom:.8rem;}

/* ═══ MODAL ═══ */
.modal-ov{
  position:fixed;inset:0;background:rgba(44,35,24,.55);
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;z-index:1000;
}
.modal-ov.show{display:flex;}
.modal{
  background:var(--surface);border:1.5px solid var(--border);
  border-radius:24px;padding:2.2rem;
  max-width:380px;width:90%;text-align:center;
  box-shadow:0 24px 60px rgba(44,35,24,.16);
  animation:fadeUp .3s ease both;
}
.modal h3{font-size:1.15rem;font-weight:900;margin-bottom:.7rem;color:var(--ink);}
.modal p{color:var(--ink2);font-size:.87rem;margin-bottom:1.5rem;line-height:1.7;}
.modal-actions{display:flex;gap:.75rem;justify-content:center;}
.modal-cancel{
  padding:.65rem 1.4rem;background:var(--cream);
  border:1.5px solid var(--border);border-radius:11px;
  color:var(--ink2);cursor:pointer;font-size:.9rem;font-weight:700;
  font-family:'Tajawal',sans-serif;transition:all .2s;
}
.modal-cancel:hover{border-color:var(--clay);color:var(--clay);}
.modal-confirm{
  padding:.65rem 1.4rem;
  background:linear-gradient(135deg,#c0392b,#9b2c2c);
  border:none;border-radius:11px;
  color:#fff;cursor:pointer;font-size:.9rem;font-weight:800;
  font-family:'Tajawal',sans-serif;
  box-shadow:0 4px 14px rgba(192,57,43,.3);
  transition:all .2s;
}
.modal-confirm:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(192,57,43,.4);}

/* REVEAL */
.rv{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.rv.up{opacity:1;transform:translateY(0);}

/* RESPONSIVE */
@media(max-width:640px){
  .content{padding:1.5rem 1rem;}
  .hdr{padding:0 1.2rem;}
  .tabs{gap:.4rem;}
  .req-card{padding:1.2rem;}
}
</style>
</head>
<body>

<div class="cur" id="cur"></div>
<div class="cur-r" id="curR"></div>
<div class="blob b1"></div>
<div class="blob b2"></div>
<div class="blob b3"></div>
<div class="dots"></div>

<!-- ═══ DELETE MODAL ═══ -->
<div class="modal-ov" id="delete-modal">
  <div class="modal">
    <h3 data-ar="🗑️ تأكيد الحذف" data-en="🗑️ Confirm Delete">🗑️ تأكيد الحذف</h3>
    <p id="modal-text"></p>
    <div class="modal-actions">
      <button class="modal-cancel" onclick="closeModal()" data-ar="إلغاء" data-en="Cancel">إلغاء</button>
      <button class="modal-confirm" onclick="confirmDelete()" data-ar="حذف نهائياً" data-en="Delete Permanently">حذف نهائياً</button>
    </div>
  </div>
</div>

<!-- ═══ LOGIN ═══ -->
<div class="login-wrap" id="login-section">
  <div class="login-card">
    <div class="login-logo">⚙️</div>
    <h2 data-ar="لوحة الإدارة" data-en="Admin Panel">لوحة الإدارة</h2>
    <p class="sub" data-ar="ادخل بيانات الأدمن للمتابعة" data-en="Enter admin credentials to continue">ادخل بيانات الأدمن للمتابعة</p>

    <div class="login-lang">
      <div class="lang-pill">
        <button class="lbtn active" id="btn-ar" onclick="setLang('ar')">ع</button>
        <button class="lbtn" id="btn-en" onclick="setLang('en')">EN</button>
      </div>
    </div>

    <div id="admin-alert" class="alert"></div>
    <div class="fg">
      <label data-ar="البريد الإلكتروني" data-en="Email Address">البريد الإلكتروني</label>
      <input id="admin-email" type="email" placeholder="admin@example.com">
    </div>
    <div class="fg">
      <label data-ar="كلمة المرور" data-en="Password">كلمة المرور</label>
      <input id="admin-pass" type="password" placeholder="••••••••">
    </div>
    <button class="btn-gold" onclick="adminLogin()" data-ar="دخول ←" data-en="Login ←">دخول ←</button>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard">

  <div class="hdr">
    <div class="hdr-logo">
      <span class="hdr-star">✦</span>
      <span data-ar="نجوم — لوحة الإدارة" data-en="Stars — Admin Panel">نجوم — لوحة الإدارة</span>
    </div>
    <div class="hdr-right">
      <div class="lang-pill">
        <button class="lbtn active" id="btn-ar2" onclick="setLang('ar')">ع</button>
        <button class="lbtn" id="btn-en2" onclick="setLang('en')">EN</button>
      </div>
      <span class="admin-badge">⚙️ <span data-ar="أدمن" data-en="Admin">أدمن</span></span>
      <button class="logout-btn" onclick="adminLogout()" data-ar="خروج" data-en="Logout">خروج</button>
    </div>
  </div>

  <div class="content">
    <div class="tabs" id="tabs-row">
      <button class="tab active" onclick="filterUsers('pending',this)" data-ar="⏳ بانتظار المراجعة" data-en="⏳ Pending Review">⏳ بانتظار المراجعة</button>
      <button class="tab" onclick="filterUsers('accepted',this)" data-ar="✅ مقبولون" data-en="✅ Accepted">✅ مقبولون</button>
      <button class="tab" onclick="filterUsers('rejected',this)" data-ar="❌ مرفوضون" data-en="❌ Rejected">❌ مرفوضون</button>
      <button class="tab" onclick="filterUsers('all',this)" data-ar="📋 الكل" data-en="📋 All">📋 الكل</button>
    </div>
    <div id="users-list"></div>
  </div>

</div>

<script>
const API='http://localhost:5000/api/auth';
let allUsers=[];
let currentFilter='pending';
let deleteTargetId=null;
let lang='ar';

/* ═══ CURSOR ═══ */
const cur=document.getElementById('cur'),curR=document.getElementById('curR');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px';});
(function loop(){rx+=(mx-rx)*.15;ry+=(my-ry)*.15;curR.style.left=rx+'px';curR.style.top=ry+'px';requestAnimationFrame(loop);})();
function curHover(){cur.style.width='20px';cur.style.height='20px';cur.style.background='var(--moss)';curR.style.opacity='0';}
function curLeave(){cur.style.width='12px';cur.style.height='12px';cur.style.background='var(--clay)';curR.style.opacity='.38';}
document.addEventListener('mouseover',e=>{if(e.target.matches('a,button,.tab,.btn-accept,.btn-reject,.btn-delete,.btn-view,.choice-btn'))curHover();else curLeave();});

/* ═══ LANGUAGE ═══ */
function setLang(l){
  lang=l;
  const isAr=l==='ar';
  document.documentElement.lang=l;
  document.documentElement.dir=isAr?'rtl':'ltr';
  /* sync both lang-pill buttons (login + dashboard) */
  ['btn-ar','btn-ar2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',isAr);});
  ['btn-en','btn-en2'].forEach(id=>{const el=document.getElementById(id);if(el)el.classList.toggle('active',!isAr);});
  document.querySelectorAll('[data-ar]').forEach(el=>{
    const v=isAr?el.getAttribute('data-ar'):el.getAttribute('data-en');
    if(v)el.textContent=v;
  });
  /* re-render if dashboard is visible */
  if(document.getElementById('dashboard').style.display!=='none') renderUsers(currentFilter);
}

/* ═══ ADMIN LOGIN ═══ */
async function adminLogin(){
  const email=document.getElementById('admin-email').value.trim();
  const password=document.getElementById('admin-pass').value;
  try{
    const res=await fetch(`${API}/admin-login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(res.ok){localStorage.setItem('adminToken',data.token);showDashboard();}
    else{const el=document.getElementById('admin-alert');el.className='alert err';el.textContent=data.message;}
  }catch{const el=document.getElementById('admin-alert');el.className='alert err';el.textContent=lang==='ar'?'تعذر الاتصال بالخادم':'Unable to connect to server';}
}

async function showDashboard(){
  document.getElementById('login-section').style.display='none';
  document.getElementById('dashboard').style.display='block';
  await loadUsers();
}

async function loadUsers(){
  const token=localStorage.getItem('adminToken');
  try{
    const res=await fetch(`${API}/users`,{headers:{'Authorization':`Bearer ${token}`}});
    allUsers=await res.json();
    renderUsers(currentFilter);
  }catch{
    document.getElementById('users-list').innerHTML=`<p style="color:var(--err);padding:1rem;">${lang==='ar'?'خطأ في تحميل البيانات':'Error loading data'}</p>`;
  }
}

function filterUsers(status,btn){
  currentFilter=status;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderUsers(status);
}

/* ═══ RENDER ═══ */
function renderUsers(status){
  const list=document.getElementById('users-list');
  const filtered=status==='all'?allUsers:allUsers.filter(u=>u.status===status);

  if(filtered.length===0){
    list.innerHTML=`<div class="empty"><div class="e-ico">📭</div>${lang==='ar'?'لا توجد طلبات في هذا القسم':'No requests in this section'}</div>`;
    return;
  }

  const labels ={pending:lang==='ar'?'⏳ قيد المراجعة':'⏳ Pending',accepted:lang==='ar'?'✅ مقبول':'✅ Accepted',rejected:lang==='ar'?'❌ مرفوض':'❌ Rejected'};
  const classes={pending:'s-pending',accepted:'s-accepted',rejected:'s-rejected'};
  const token=localStorage.getItem('adminToken');

  list.innerHTML=filtered.map((u,i)=>{

    /* cert block */
    let certHtml='';
    if(u.medicalCertificate){
      certHtml=`
        <div class="cert-section">
          <div class="cert-sec-title">${lang==='ar'?'📄 الشهادة الطبية للتشخيص':'📄 Medical Diagnosis Certificate'}</div>
          <div class="cert-card">
            <div class="cert-ico">📄</div>
            <div class="cert-info">
              <div class="cert-name">${u.certFileName||u.medicalCertificate}</div>
              <div class="cert-sub">${lang==='ar'?'شهادة طبية رسمية مرفقة بالملف':'Official medical certificate attached to file'}</div>
            </div>
            <div class="cert-actions">
              <a class="btn-view" href="${API}/certificate/${u.medicalCertificate}?token=${token}" target="_blank">
                👁️ ${lang==='ar'?'عرض':'View'}
              </a>
            </div>
          </div>
        </div>`;
    }else{
      certHtml=`
        <div class="cert-section">
          <div class="cert-sec-title">${lang==='ar'?'📄 الشهادة الطبية':'📄 Medical Certificate'}</div>
          <div class="no-cert">⚠️ ${lang==='ar'?'لم يتم إرفاق شهادة طبية':'No medical certificate attached'}</div>
        </div>`;
    }

    /* autism level display */
    const lvlMap={خفيف:'Mild',متوسط:'Moderate',شديد:'Severe'};
    const lvlDisplay=lang==='ar'?(u.autismLevel||'—'):(lvlMap[u.autismLevel]||u.autismLevel||'—');
    const lvlClass=`lvl-${u.autismLevel}`;

    /* date */
    const dateStr=new Date(u.createdAt).toLocaleDateString(lang==='ar'?'ar-DZ':'en-GB');

    return `
      <div class="req-card rv" style="animation-delay:${i*0.06}s">
        <div class="req-top">
          <div class="info">
            <h3>
              <span class="status ${classes[u.status]}">${labels[u.status]}</span>
              ${u.firstName} ${u.lastName}
            </h3>
            <p>📧 ${u.email} &nbsp;|&nbsp; 📞 ${u.phone}</p>
            <p>${lang==='ar'?'👨‍👩‍👦 صلة القرابة':'👨‍👩‍👦 Relationship'}: ${u.relationship||'—'}</p>
            <p class="date">📅 ${dateStr}</p>
          </div>
          <div class="actions">
            ${u.status!=='accepted'?`<button class="btn-accept" onclick="decide('${u._id}','accept')">${lang==='ar'?'✅ قبول':'✅ Accept'}</button>`:''}
            ${u.status!=='rejected'?`<button class="btn-reject" onclick="decide('${u._id}','reject')">${lang==='ar'?'❌ رفض':'❌ Reject'}</button>`:''}
            <button class="btn-delete" onclick="openModal('${u._id}','${u.childName||u.firstName}')">${lang==='ar'?'🗑️ حذف':'🗑️ Delete'}</button>
          </div>
        </div>

        <div class="child-grid">
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'اسم الطفل':'Child Name'}</div><div class="ci-val">👶 ${u.childName||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'درجة التوحد':'Autism Level'}</div><div class="ci-val"><span class="${lvlClass}">${lvlDisplay}</span></div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'تاريخ الميلاد':'Date of Birth'}</div><div class="ci-val">🎂 ${u.birthDate||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'الجنس':'Gender'}</div><div class="ci-val">${u.gender||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'المدينة':'City'}</div><div class="ci-val">📍 ${u.city||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'الطبيب المشخِّص':'Diagnosing Doctor'}</div><div class="ci-val">👨‍⚕️ ${u.doctorName||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'المستشفى':'Hospital'}</div><div class="ci-val">🏥 ${u.hospital||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'نوع العلاج':'Therapy Type'}</div><div class="ci-val">💊 ${u.therapyType||(lang==='ar'?'لا يوجد':'None')}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'القدرة على الكلام':'Speaking Ability'}</div><div class="ci-val">🗣️ ${u.speakingAbility||'—'}</div></div>
          <div class="ci"><div class="ci-lbl">${lang==='ar'?'يذهب للمدرسة':'Goes to School'}</div><div class="ci-val">🏫 ${u.goesToSchool||'—'}</div></div>
          ${u.notes?`<div class="ci" style="grid-column:1/-1"><div class="ci-lbl">${lang==='ar'?'ملاحظات':'Notes'}</div><div class="ci-val">📝 ${u.notes}</div></div>`:''}
        </div>

        ${certHtml}
      </div>`;
  }).join('');

  /* trigger reveal */
  requestAnimationFrame(()=>{
    document.querySelectorAll('.rv').forEach((el,i)=>{
      setTimeout(()=>el.classList.add('up'),i*60);
    });
  });
}

/* ═══ DECIDE ═══ */
async function decide(id,action){
  const token=localStorage.getItem('adminToken');
  try{
    const res=await fetch(`${API}/users/${id}/${action==='accept'?'accept':'reject'}`,{method:'PATCH',headers:{'Authorization':`Bearer ${token}`}});
    const data=await res.json();
    if(res.ok)await loadUsers();
    else alert((lang==='ar'?'خطأ: ':'Error: ')+data.message);
  }catch{alert(lang==='ar'?'تعذر الاتصال بالخادم':'Unable to connect to server');}
}

/* ═══ MODAL ═══ */
function openModal(id,name){
  deleteTargetId=id;
  document.getElementById('modal-text').innerHTML=
    lang==='ar'
      ?`هل أنت متأكد من حذف سجل <strong>"${name}"</strong> نهائياً؟<br><span style="color:var(--err);">لا يمكن التراجع عن هذا الإجراء.</span>`
      :`Are you sure you want to permanently delete <strong>"${name}"</strong>?<br><span style="color:var(--err);">This action cannot be undone.</span>`;
  document.getElementById('delete-modal').classList.add('show');
}
function closeModal(){deleteTargetId=null;document.getElementById('delete-modal').classList.remove('show');}
async function confirmDelete(){
  if(!deleteTargetId)return;
  const token=localStorage.getItem('adminToken');
  try{
    const res=await fetch(`${API}/users/${deleteTargetId}`,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
    const data=await res.json();
    closeModal();
    if(res.ok)await loadUsers();
    else alert((lang==='ar'?'خطأ: ':'Error: ')+data.message);
  }catch{alert(lang==='ar'?'تعذر الاتصال بالخادم':'Unable to connect to server');closeModal();}
}
document.getElementById('delete-modal').addEventListener('click',function(e){if(e.target===this)closeModal();});

function adminLogout(){localStorage.removeItem('adminToken');location.reload();}

window.onload=()=>{if(localStorage.getItem('adminToken'))showDashboard();};
</script>
</body>
</html>
