<!-- ══ زر VR ══ -->
<div class="sec-lbl" style="margin-top:1rem;">🥽 الاتصال بالـ VR</div>
<button class="sub-btn moss" onclick="getVRToken()" style="background:linear-gradient(135deg,var(--lilac),#7a5fa0);box-shadow:0 6px 20px rgba(155,127,184,.3);">
  🥽 احصل على رمز الاتصال بالـ VR
</button>

<div id="vr-token-display" style="display:none;text-align:center;margin:.9rem 0;padding:1.2rem;background:var(--cream);border:2px dashed var(--clay);border-radius:13px;">
  <div style="font-size:.78rem;color:var(--ink2);margin-bottom:.5rem;">رمز الاتصال بالـ VR — صالح لمدة 10 دقائق</div>
  <div id="vr-token-code" style="font-size:2.8rem;font-weight:900;color:var(--clay);letter-spacing:.4em;"></div>
  <div style="font-size:.72rem;color:var(--ink2);margin-top:.4rem;">أدخل هذا الرمز في الكاسك</div>
</div>

<!-- ══ جلسات VR ══ -->
<div id="vr-sessions-wrap" style="display:none;margin-top:1rem;">
  <div class="sec-lbl">📅 سجل جلسات VR</div>
  <div id="vr-sessions-list"></div>
</div>

<button class="logout-btn" onclick="logout()">خروج ←</button>
